# Local pre-commit configuration for integration testing.
#
# This lets you run the hooks against the files in *this* repository without
# publishing a release first.
#
# Prerequisites:
#   pip install pre-commit
#   pip install -e .          # installs the hook entry-points locally
#
# Usage:
#   pre-commit run --all-files
#
# You should see the hooks process the files in examples/ and fix bad.yaml.

repos:
  - repo: local
    hooks:
      - id: fix-yaml-document-start
        name: Fix YAML Document Start
        description: Adds the '---' document start marker at the beginning of YAML files if it is missing.
        entry: fix-yaml-document-start
        language: python
        types: [yaml]

      - id: fix-yaml-comment-spacing
        name: Fix YAML Comment Spacing
        description: Ensures YAML comments have a single space after '#' and that inline comments are preceded by at least two spaces.
        entry: fix-yaml-comment-spacing
        language: python
        types: [yaml]
